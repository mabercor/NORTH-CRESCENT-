<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>North Crescent</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .lang-btn { margin: 10px; padding: 10px; cursor: pointer; }
        .header { background-color: #f1f1f1; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to North Crescent</h1>
        <div>
            <button class="lang-btn" onclick="setLanguage('en')">English</button>
            <button class="lang-btn" onclick="setLanguage('fr')">Français</button>
        </div>
    </div>
    <script>
        function setLanguage(lang) {
            if(lang === 'fr') {
                document.querySelector('h1').innerText = 'Bienvenue à North Crescent';
            } else {
                document.querySelector('h1').innerText = 'Welcome to North Crescent';
            }
        }
    </script>
</body>
</html>
